<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

<!-- ============================================================
     PWA META TAGS
     ============================================================ -->
<meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14110d" media="(prefers-color-scheme: dark)">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hybrid">
<meta name="format-detection" content="telephone=no">

<link rel="manifest" href="./manifest.json">

<!-- Icons (see ./icons/README.md for what PNGs to generate) -->
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png">
<link rel="alternate icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230e1410'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Georgia,serif' font-size='32' fill='%23c89a3a' font-style='italic'%3Eh%3C/text%3E%3C/svg%3E">

<title>Hybrid · Training Plan</title>

<!-- App stylesheet -->
<link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <header class="topbar" id="topbar">
    <div class="topbar-inner">
      <button class="btn-back" id="btn-back" style="visibility:hidden;" aria-label="Back" onclick="Router.pop()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Hybrid</div>
      <div class="topbar-spacer" id="topbar-spacer"></div>
    </div>
  </header>

  <!-- SCREEN STACK -->
  <main class="stack" id="stack"></main>

  <!-- TAB BAR -->
  <nav class="tabbar" id="tabbar">
    <div class="tabbar-inner">
      <button class="tab active" data-tab="home" onclick="Router.switchTab('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"></path><path d="M5 10v10h14V10"></path></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-tab="phases" onclick="Router.switchTab('phases')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line><line x1="9" y1="4" x2="9" y2="20"></line></svg>
        <span>Phases</span>
      </button>
      <button class="tab" data-tab="tracking" onclick="Router.switchTab('tracking')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        <span>Tracking</span>
      </button>
      <button class="tab" data-tab="profile" onclick="Router.switchTab('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
      </button>
      <button class="tab" data-tab="settings" onclick="Router.switchTab('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
      </button>
    </div>
  </nav>

</div>

<!-- App as ES module — loads modules lazily, no build system needed -->
<script type="module" src="./src/app.js"></script>

</body>
</html>
